services:
  compiler-api:
    build:
      context: .
      dockerfile: services/compiler-api/Dockerfile
    environment:
      PORT: "4000"
      HOST: 0.0.0.0
      COMPILER_RUNTIME: native
      MAX_CONCURRENT: "2"
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports: ["4000:4000"]
    read_only: true
    tmpfs: ["/tmp:rw,nosuid,nodev,noexec,size=256m"]
    security_opt: ["no-new-privileges:true"]

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      COMPILE_API_URL: http://compiler-api:4000/compile
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    ports: ["3000:3000"]
    depends_on: [compiler-api]

volumes:
  web_node_modules:
